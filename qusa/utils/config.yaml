# QUSA/config.yaml

# ------------------
# Data settings
# ------------------
data:
  start_date: '2023-12-01'
  end_date: '2025-12-01'

  tickers:
    - AMZN

  paths:
    raw_data_dir: '~/Projects/qusa/data/raw'
    processed_data_dir: '~/Projects/qusa/data/processed'
    figures_dir: '~/Projects/qusa/data/figures'
    predictions_dir: '~/Projects/qusa/data/predictions'

# ------------------
# Feature engineering
# ------------------
features:
  rsi_window: 14
  atr_window: 14
  volume_ma_window: 20
  rolling_window_52w: 252

# ------------------
# Analysis settings
# ------------------
analysis:
  abnormal_threshold: 2.0
  minimum_event_occurrences: 20
  strong_lift: 1.5
  moderate_lift: 1.2


# ------------------
# Model settings
# ------------------
model:
  output:
    model_output_path: "~/Projects/qusa/saved_models"
  parameters:
    max_depth: 5
    min_samples_leaf: 10
    min_samples_split: 20
    class_weight: balanced
    random_state: 42
    test_size: 0.25
    cv: 5
    probability_threshold: 0.7

evaluation:
  save_results: true

prediction:
  save: true
  log_file: "~/Projects/qusa/data/predictions/prediction_log.csv"


# ------------------
# Backtesting settings
# ------------------
backtest:
    initial_capital: 10000
    position_size: 0.95
    transaction_cost: 0.05      # % cost per trade (slippage + spread)
    save_results: true
    save_plots: true

pipeline:
  skip_fe: false
  skip_clustering: false
  skip_backtest: false


# ------------------
# Monte Carlo feature engineering
# ------------------
monte_carlo:
  enabled: true                    # Master toggle for MC features
  window_size: 252                 # Rolling window size (trading days)
  iterations: 1000                 # Number of simulation paths per day
  random_seed: 42                  # Fixed seed for reproducibility
  min_data_threshold: 252          # Start calculating after this many rows

  features:                        # Which MC statistics to generate
    - mc_1d_q1                     # 1st percentile (extreme downside)
    - mc_1d_q5                     # 5th percentile (tail risk)
    - mc_1d_q10                    # 10th percentile (moderate downside)
    - mc_1d_q50                    # 50th percentile (median)
    - mc_1d_q95                    # 95th percentile (upside potential)
    - mc_1d_return_pct             # Expected return percentage
    - mc_1d_prob_breakeven         # Probability of positive return